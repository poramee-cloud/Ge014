<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>แบบทดสอบบุคลิกภาพนิสิต & อาจารย์</title>
    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
            font-family: 'Tahoma', sans-serif;
            background:
                radial-gradient(circle at top left, #dbeafe 0%, transparent 32%),
                radial-gradient(circle at bottom right, #ede9fe 0%, transparent 28%),
                linear-gradient(135deg, #f8fafc 0%, #eef2ff 100%);
            color: #111827;
        }

        .card {
            width: 100%;
            max-width: 520px;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.7);
            border-radius: 28px;
            padding: 32px;
            box-shadow: 0 20px 50px rgba(15, 23, 42, 0.12);
        }

        .badge {
            display: inline-block;
            padding: 8px 14px;
            border-radius: 999px;
            background: #e0e7ff;
            color: #4338ca;
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 14px;
        }

        h2, h3 {
            margin-top: 0;
            text-align: center;
            line-height: 1.45;
        }

        h2 {
            margin-bottom: 10px;
            font-size: 30px;
        }

        h3 {
            margin-bottom: 22px;
            color: #374151;
            font-size: 22px;
            font-weight: 700;
        }

        .subtext {
            text-align: center;
            color: #6b7280;
            margin: 0 0 24px;
            line-height: 1.7;
            font-size: 15px;
        }

        .hidden {
            display: none !important;
        }

        .options {
            display: grid;
            gap: 12px;
        }

        button {
            border: none;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s ease;
        }

        .primary-btn {
            width: 100%;
            padding: 14px 18px;
            margin-top: 18px;
            border-radius: 16px;
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            color: white;
            font-size: 16px;
            font-weight: 700;
            box-shadow: 0 10px 22px rgba(79, 70, 229, 0.22);
        }

        .primary-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 28px rgba(79, 70, 229, 0.28);
        }

        .choice-btn {
            width: 100%;
            padding: 16px 18px;
            text-align: left;
            background: white;
            border: 1.5px solid #e5e7eb;
            border-radius: 18px;
            color: #1f2937;
            font-size: 16px;
            line-height: 1.5;
            box-shadow: 0 8px 18px rgba(15, 23, 42, 0.04);
        }

        .choice-btn:hover {
            transform: translateY(-2px);
            border-color: #60a5fa;
            background: #f8fbff;
            box-shadow: 0 12px 24px rgba(37, 99, 235, 0.08);
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 700;
            color: #374151;
            margin-bottom: 8px;
        }

        select {
            width: 100%;
            padding: 14px 14px;
            border-radius: 14px;
            border: 1.5px solid #d1d5db;
            background: #fff;
            font-size: 15px;
            outline: none;
        }

        select:focus {
            border-color: #60a5fa;
            box-shadow: 0 0 0 4px rgba(96, 165, 250, 0.15);
        }

        .result-box {
            background: linear-gradient(135deg, #f8fafc, #eef2ff);
            border: 1px solid #e5e7eb;
            border-radius: 22px;
            padding: 18px;
            margin: 18px 0;
        }

        .result-title {
            color: #2563eb;
            text-align: center;
            font-size: 26px;
            font-weight: 800;
            margin: 4px 0 10px;
        }

        .stats {
            text-align: center;
            color: #4b5563;
            font-size: 15px;
            margin: 0;
        }

        .divider {
            margin: 22px 0;
            border: 0;
            border-top: 1px solid #e5e7eb;
        }

        #ai-loading {
            text-align: center;
            color: #6b7280;
            font-style: italic;
            line-height: 1.6;
        }

        #ai-recommendation {
            display: block;
            font-weight: 700;
            color: #166534;
            line-height: 1.75;
            padding: 18px;
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            border-radius: 18px;
            margin-top: 14px;
            white-space: pre-wrap;
        }

        @media (max-width: 640px) {
            body { padding: 14px; }
            .card { padding: 22px; border-radius: 22px; }
            h2 { font-size: 25px; }
            h3 { font-size: 19px; }
            .choice-btn { font-size: 15px; }
        }
    </style>
</head>
<body>
    <div class="card" id="quiz-container">
        <div id="setup-step">
            <div class="badge">Personality Quiz</div>
            <h2>ข้อมูลทั่วไป</h2>
            <p class="subtext">ตอบข้อมูลเบื้องต้นก่อนเริ่ม แล้วระบบจะวิเคราะห์ผลพร้อมข้อความจาก AI ให้ท้ายแบบทดสอบ</p>

            <div class="form-group">
                <label for="gender">เพศ</label>
                <select id="gender">
                    <option value="ชาย">ชาย</option>
                    <option value="หญิง">หญิง</option>
                    <option value="อื่นๆ">อื่นๆ</option>
                </select>
            </div>

            <div class="form-group">
                <label for="age">ช่วงอายุ</label>
                <select id="age">
                    <option value="18-20">18-20</option>
                    <option value="21-25">21-25</option>
                    <option value="26-30">26-30</option>
                </select>
            </div>

            <div class="form-group">
                <label for="role">บทบาท</label>
                <select id="role">
                    <option value="นิสิต">นิสิต</option>
                    <option value="อาจารย์">อาจารย์</option>
                </select>
            </div>

            <button class="primary-btn" onclick="startQuiz()">เริ่มทำแบบทดสอบ</button>
        </div>

        <div id="question-step" class="hidden">
            <div class="badge">Question</div>
            <h3 id="question-text">คำถามจะขึ้นที่นี่</h3>
            <div id="options-container" class="options"></div>
        </div>

        <div id="result-step" class="hidden">
            <div class="badge">Result</div>
            <h2>ผลลัพธ์ของคุณคือ...</h2>

            <div class="result-box">
                <div id="title-text" class="result-title"></div>
                <p id="stats-text" class="stats"></p>
            </div>

            <hr class="divider" />
            <p id="ai-loading">AI กำลังวิเคราะห์ตัวตนของคุณ...</p>
            <div id="ai-recommendation"></div>
            <button class="primary-btn" onclick="location.reload()">ทำใหม่อีกครั้ง</button>
        </div>
    </div>

    <script>
        const studentQuestions = [
            { q: "ถ้างทำงานกลุ่มเพื่อนดองจนวันสุดท้าย คุณจะ...", options: [

            { text: "ใช้ AI ช่วยร่างโครงงานให้ไวขึ้น", health: -5, stress: 10, tag: "#สายTool" },
            { text: "ตามจิกเพื่อนทุกคนจนกว่าจะทำ", health: -10, stress: 20, tag: "#สายจิก" },
            { text: "ปล่อยจอย นอนดีกว่า", health: 20, stress: 0, tag: "#สายชิลล์" }
            ]},
            { q: "วันหยุดยาวนี้แผนของคุณคือ?", options: [

                { text: "ปั่นโปรเจกต์ที่ดองไว้", health: -15, stress: 25, tag: "#สายปั่น" },

                { text: "ทักไลน์ฝากเพื่อนเช็กชื่อ", health: 10, stress: 5, tag: "#สายเนียน" },

                { text: "ปลง แล้วรอลุ้นเกรด D", health: 15, stress: 5, tag: "#สายปลง" }

            { q: "เพื่อนชวนตี้เกม/ร้านเหล้า แต่พรุ่งนี้มีสอบ", options: [
                { text: "ไปดิ! ชีวิตมีครั้งเดียว", health: -25, stress: 10, tag: "#สายตี้" },
                { text: "ปฏิเสธแล้วนั่งอ่านหนังสือ", health: 10, stress: 30, tag: "#เด็กหน้าห้อง" },
                { text: "ไปแค่ชั่วโมงเดียว (แต่ไหลถึงเช้า)", health: -15, stress: 20, tag: "#สายสังคม" },
                { text: "ไม่ไป เพราะขี้เกียจแต่งตัว", health: 20, stress: 0, tag: "#สายชิลล์" }
            ]},
            { q: "เจอวิชาที่อาจารย์สอนน่าเบื่อมาก คุณจะ...", options: [

                { text: "ไถโซเชียล/เล่นมือถือ", health: 0, stress: -5, tag: "#สายออนไลน์" },
                { text: "นั่งจดตามทุกคำพูด", health: -10, stress: 25, tag: "#สายจด" },

            ]},
            { q: "ถ้าในกลุ่มงานมีคนไม่ช่วยเลย (Free Rider)", options: [

                { text: "ด่าในกลุ่มแชท", health: -5, stress: 30, tag: "#สายปะทะ" },
                { text: "ช่างมัน แบกเอง", health: -20, stress: 20, tag: "#สายแบก" },
                { text: "ไปฟ้องอาจารย์", health: 5, stress: 25, tag: "#สายรายงาน" }
            ]},
            { q: "เงินเดือน/เงินโอนจากบ้านเหลือ 100 บาทสุดท้าย", options: [
                { text: "กินมาม่าประทังชีวิต", health: -15, stress: 20, tag: "#สายประหยัด" },
                { text: "ยืมเพื่อนก่อน", health: 5, stress: 15, tag: "#สายยืม" },
                { text: "ซื้อหวย ลุ้นรวยทางลัด", health: -10, stress: 30, tag: "#สายเสี่ยง" },
                { text: "ขอเพิ่มจากแม่", health: 10, stress: 5, tag: "#สายอ้อน" }
            ]},
            { q: "ถ้าต้องพรีเซนต์งานหน้าห้องคนเดียว", options: [
                { text: "ตื่นเต้นจนพูดตะกุกตะกัก", health: -10, stress: 40, tag: "#สายตื่นเต้น" },
                { text: "เตรียมตัวมาดี พูดคล่องปรื๋อ", health: 5, stress: 15, tag: "#สายโปร" },
                { text: "อ่านตามสไลด์ให้จบๆ ไป", health: 0, stress: 10, tag: "#สายเนียน" },
                { text: "ใช้มุกตลกกลบความตื่นเต้น", health: 5, stress: 10, tag: "#สายฮา" }
            ]},
            { q: "เป้าหมายหลังเรียนจบของคุณคือ?", options: [
                { text: "หางานทำที่ได้เงินเยอะๆ", health: -10, stress: 30, tag: "#สายจิงจัง" },
                { text: "ต่อ ป.โท ทันที", health: -15, stress: 40, tag: "#สายวิชาการ" },
                { text: "พักสัก 1 ปี ออกเดินทาง", health: 30, stress: -30, tag: "#สายชิลล์" },
                { text: "ทำธุรกิจส่วนตัว/Freelance", health: -5, stress: 35, tag: "#สายเถ้าแก่" }
            ]}
    ];

            const teacherQuestions = [
        { q: "นิสิตส่งงานพร้อมกัน 200 คนในวันเดียว...", options: [
            { text: "อดนอนตรวจให้เสร็จตามกำหนด", health: -30, stress: 40, tag: "#อาจารย์สู้ชีวิต" },
            { text: "ใช้ Rubric และระบบช่วยตรวจ", health: 10, stress: 10, tag: "#อาจารย์สายระบบ" },

            { text: "เรียกมาคุยและให้ทำใหม่", health: 5, stress: 30, tag: "#อาจารย์สายเป๊ะ" },

            { text: "ปล่อยผ่าน ถ้าเนื้อหาดูดี", health: 15, stress: -10, tag: "#อาจารย์สายชิลล์" }
        ]},
        { q: "มีนิสิตทักแชทมาถามเรื่องงานตอนเที่ยงคืน", options: [

        { q: "เมื่อต้องประชุมคณะที่ยืดเยื้อและน่าเบื่อ", options: [

        { q: "นิสิตขอเกรดเพิ่มเพราะต้องรักษาสิทธิชิงทุน", options: [

            { text: "บ่นลงโซเชียลระบายอารมณ์", health: 0, stress: 15, tag: "#อาจารย์สายระบาย" }

        { q: "นิสิตประเมินการสอนของคุณว่า 'สอนยากจัง'", options: [
            { text: "ปรับเนื้อหาให้ง่ายขึ้นเทอมหน้า", health: 5, stress: 10, tag: "#อาจารย์สายปรับตัว" },
            { text: "ไม่สนใจ 'มาตรฐานคือมาตรฐาน'", health: 10, stress: 15, tag: "#อาจารย์สายแข็ง" },
            { text: "เรียกนิสิตมาคุยว่ายากตรงไหน", health: 0, stress: 20, tag: "#อาจารย์สายใส่ใจ" },
            { text: "แอบเสียใจอยู่เงียบๆ", health: -10, stress: 20, tag: "#อาจารย์สายอ่อนไหว" }
        ]},
        { q: "ความภูมิใจที่สุดในการเป็นอาจารย์คือ?", options: [
            { text: "เห็นนิสิตประสบความสำเร็จ", health: 30, stress: -10, tag: "#อาจารย์สายอุดมการณ์" },
            { text: "งานวิจัยได้รับการตีพิมพ์ระดับโลก", health: 10, stress: 40, tag: "#อาจารย์สายวิชาการ" },
            { text: "มีเวลาว่างไปอยู่กับครอบครัว", health: 40, stress: -20, tag: "#อาจารย์สายครอบครัว" },
            { text: "ได้รับการยอมรับในสังคม", health: 10, stress: 20, tag: "#อาจารย์สายสังคม" }
        ]}
    ];

        let currentStep = 0;
        let score = { health: 50, stress: 0, tags: [] };
        let userRole = "";
        let questions = [];

        const webAppUrl = "https://script.google.com/macros/s/AKfycbzbuQ6ok_7SDcpBFm_i9KYHT9y79U0BZC5bRNM_A7VzVrX_1INLTBmOyPOjRjPCE05kjQ/exec";

        function startQuiz() {
            currentStep = 0;
            score = { health: 50, stress: 0, tags: [] };

            userRole = document.getElementById('role').value;
            questions = (userRole === 'นิสิต') ? studentQuestions : teacherQuestions;

            document.getElementById('setup-step').classList.add('hidden');
            document.getElementById('question-step').classList.remove('hidden');
            document.getElementById('result-step').classList.add('hidden');
            showQuestion();
        }

        function showQuestion() {
            const q = questions[currentStep];
            document.getElementById('question-text').innerText = q.q;
            const container = document.getElementById('options-container');
            container.innerHTML = '';

            q.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.innerText = opt.text;
                btn.className = 'choice-btn';
                btn.onclick = () => nextQuestion(opt);
                container.appendChild(btn);
            });
        }

        function nextQuestion(opt) {
            score.health += opt.health;
            score.stress += opt.stress;
            score.tags.push(opt.tag);

            currentStep++;
            if (currentStep < questions.length) {
                showQuestion();
            } else {
                finishQuiz();
            }
        }

        function finishQuiz() {
            document.getElementById('question-step').classList.add('hidden');
            document.getElementById('result-step').classList.remove('hidden');
            document.getElementById('ai-loading').style.display = 'block';
            document.getElementById('ai-loading').innerText = 'AI กำลังวิเคราะห์ตัวตนของคุณ...';
            document.getElementById('ai-recommendation').innerText = '';

            score.health = Math.max(0, Math.min(100, score.health));
            score.stress = Math.max(0, Math.min(100, score.stress));

            let title = '';

            if (score.stress > 75 && score.health < 20) {
                title = (userRole === 'นิสิต')
                    ? 'นิสิตใกล้ร่างสลาย (ระดับวิกฤต)'
                    : 'อาจารย์ผู้แบกจักรวาล (ขั้นสุด)';
            }
            else if (score.stress > 60) {
                title = (userRole === 'นิสิต')
                    ? 'เดอะแบกแห่งคณะ (เครียดสะสม)'
                    : 'ผู้แบกความหวังของภาควิชา';
            }
            else if (score.health < 25) {
                title = (userRole === 'นิสิต')
                    ? 'นิสิตสู้ชีวิต (แต่ชีวิตสู้กลับ)'
                    : 'อาจารย์ร่างทอง (ที่มอดไหม้แล้ว)';
            }
            else if (score.stress > 45) {
                title = (userRole === 'นิสิต')
                    ? 'ผู้ประสบภัยทางการศึกษา'
                    : 'บุคลากรผู้ทำงานหนักเกินพิกัด';
            }
            else if (score.health < 45) {
                title = (userRole === 'นิสิต')
                    ? 'นิสิตผู้ต้องการการพักผ่อน'
                    : 'อาจารย์ผู้ถวิลหาวันหยุด';
            }
            else if (score.stress < 15 && score.health > 85) {
                title = (userRole === 'นิสิต')
                    ? 'เทพเจ้าสายชิลล์ระดับตำนาน'
                    : 'อาจารย์สายสโลว์ไลฟ์ระดับตำนาน';
            }
            else if (score.health > 65 && score.stress < 30) {
                title = (userRole === 'นิสิต')
                    ? 'เทพเจ้าสายชิลล์'
                    : 'อาจารย์สายสโลว์ไลฟ์';
            }
            else if (score.health > 70) {
                title = (userRole === 'นิสิต')
                    ? 'นิสิตสุขภาพพรีเมียม'
                    : 'อาจารย์สายเฮลตี้ร่างทอง';
            }
            else {
                title = (userRole === 'นิสิต')
                    ? 'นิสิตผู้ใช้ชีวิตตามอัตภาพ'
                    : 'บุคลากรทรงคุณค่า';
            }

document.getElementById('title-text').innerText = title;

            document.getElementById('title-text').innerText = title;
            document.getElementById('stats-text').innerText = `สุขภาพ: ${score.health} | ความเครียด: ${score.stress}`;

            const tagCounts = {};
            score.tags.forEach(t => tagCounts[t] = (tagCounts[t] || 0) + 1);
            const topTag = Object.keys(tagCounts).reduce((a, b) => tagCounts[a] > tagCounts[b] ? a : b);

            const formData = new FormData();
            formData.append('gender', document.getElementById('gender').value);
            formData.append('age', document.getElementById('age').value);
            formData.append('role', userRole);
            formData.append('health', score.health);
            formData.append('stress', score.stress);
            formData.append('title', title);
            formData.append('topTag', topTag);
            formData.append('allTags', JSON.stringify(score.tags));

            fetch(webAppUrl, {
                method: 'POST',
                body: formData
            })
            .then(res => res.json())
            .then(result => {
                if (result.result === 'success') {
                    document.getElementById('ai-loading').style.display = 'none';
                    document.getElementById('ai-recommendation').innerText = result.aiRecommendation || 'AI วิเคราะห์เสร็จแล้ว';
                } else {
                    document.getElementById('ai-loading').innerText = 'เกิดข้อผิดพลาด: ' + (result.message || 'ไม่ทราบสาเหตุ');
                }
            })
            .catch(err => {
                document.getElementById('ai-loading').innerText = 'เชื่อมต่อ server ไม่สำเร็จ (เช็ค URL หรือการ Deploy)';
                console.error('Error:', err);
            });
        }
    </script>
